# JUnit 5 parallel execution configuration
# https://junit.org/junit5/docs/current/user-guide/#writing-tests-parallel-execution
junit.jupiter.execution.parallel.enabled=true

# Default behavior:
# - Run test methods in parallel
# - Run different test classes in parallel
junit.jupiter.execution.parallel.mode.default=concurrent
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Use a fixed-size thread pool:
# - This caps the number of concurrently executing test methods/classes.
# - We'll set it to 3 to match "max 3 browser instances at a time".
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=3
